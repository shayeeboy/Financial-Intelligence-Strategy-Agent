name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Offline unit acceptance (npm run check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  smoke:
    name: Live data smoke (public APIs — non-blocking)
    runs-on: ubuntu-latest
    # Hits live StatCan/CMHC/BoC endpoints; kept non-blocking so upstream
    # availability never red-lights a PR. Review the log if it warns.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run smoke

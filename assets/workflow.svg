<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="980" height="560" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="32" y="46" font-size="23" font-weight="700" fill="#0f172a">Orchestrator — Standard Operating Procedure</text>
  <text x="32" y="70" font-size="14" fill="#64748b">One `npm run brief` run: gather live data → check confidence → synthesize → persist. Each box maps to a function in src/orchestrator.js.</text>

  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <g>
    <rect x="32" y="104" width="210" height="78" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
    <circle cx="56" cy="128" r="12" fill="#7c3aed"/><text x="56" y="132" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="76" y="132" font-size="14" font-weight="700" fill="#5b21b6">Identify gaps</text>
    <text x="48" y="156" font-size="11.5" fill="#6d28d9">Read data/briefs/</text>
    <text x="48" y="172" font-size="11.5" fill="#6d28d9">master_index.md</text>
  </g>

  <!-- Step 2 (gather, parallel) -->
  <g>
    <rect x="286" y="92" width="240" height="102" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.7"/>
    <circle cx="310" cy="116" r="12" fill="#2563eb"/><text x="310" y="120" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="330" y="120" font-size="14" font-weight="700" fill="#1e3a8a">Gather live data (parallel)</text>
    <text x="302" y="145" font-size="11" fill="#2563eb">• StatCan — debt-to-income, CPI</text>
    <text x="302" y="163" font-size="11" fill="#0d9488">• CMHC — Toronto rent + vacancy</text>
    <text x="302" y="181" font-size="11" fill="#d97706">• BoC — policy · prime · 5yr mtg</text>
  </g>

  <!-- Step 3 derive -->
  <g>
    <rect x="570" y="104" width="210" height="78" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
    <circle cx="594" cy="128" r="12" fill="#7c3aed"/><text x="594" y="132" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="614" y="132" font-size="14" font-weight="700" fill="#5b21b6">Derive metrics</text>
    <text x="586" y="156" font-size="11.5" fill="#6d28d9">YoY · annualized rent ·</text>
    <text x="586" y="172" font-size="11.5" fill="#6d28d9">30%-rule required income</text>
  </g>

  <!-- snapshot note -->
  <g>
    <rect x="808" y="104" width="140" height="78" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="1.4"/>
    <text x="878" y="132" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">Snapshot</text>
    <text x="878" y="152" font-size="10.5" fill="#475569" text-anchor="middle">raw pull saved to</text>
    <text x="878" y="167" font-size="10.5" fill="#475569" text-anchor="middle">data/raw/*.json</text>
  </g>

  <!-- Decision diamond -->
  <g>
    <polygon points="405,250 525,308 405,366 285,308" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8"/>
    <text x="405" y="300" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">Confidence</text>
    <text x="405" y="318" font-size="12" fill="#dc2626" text-anchor="middle">≥ 3 yrs baseline?</text>
  </g>
  <!-- No branch -->
  <g>
    <rect x="586" y="272" width="362" height="72" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
    <text x="606" y="298" font-size="13" font-weight="700" fill="#9a3412">NO → flag "Low Confidence"</text>
    <text x="606" y="320" font-size="11" fill="#c2410c">Written to memory.md + console alert (escalation path).</text>
    <text x="606" y="336" font-size="11" fill="#c2410c">Brief still produced, clearly marked for review.</text>
  </g>
  <text x="548" y="298" font-size="11" font-weight="700" fill="#ea580c">no</text>
  <text x="398" y="392" font-size="11" font-weight="700" fill="#16a34a">yes ↓</text>

  <!-- Step 4 synthesize -->
  <g>
    <rect x="32" y="430" width="270" height="92" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.7"/>
    <circle cx="56" cy="456" r="12" fill="#7c3aed"/><text x="56" y="460" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="76" y="460" font-size="14" font-weight="700" fill="#5b21b6">Strategic synthesis</text>
    <text x="48" y="484" font-size="10.8" fill="#6d28d9">Exec Summary → Demographic Profile →</text>
    <text x="48" y="500" font-size="10.8" fill="#6d28d9">Impediments → Product Opportunities;</text>
    <text x="48" y="516" font-size="10.8" fill="#6d28d9">each with a Financial Services Implication</text>
  </g>

  <!-- Step 5 write -->
  <g>
    <rect x="346" y="430" width="270" height="92" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="1.7"/>
    <circle cx="370" cy="456" r="12" fill="#475569"/><text x="370" y="460" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="390" y="460" font-size="14" font-weight="700" fill="#334155">Write file + matrix</text>
    <text x="362" y="484" font-size="11" fill="#475569">compile_strategy_brief →</text>
    <text x="362" y="500" font-size="11" fill="#475569">data/briefs/&lt;name&gt;.md, then append</text>
    <text x="362" y="516" font-size="11" fill="#475569">a row to master_index.md</text>
  </g>

  <!-- Step 6 memory -->
  <g>
    <rect x="660" y="430" width="288" height="92" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="1.7"/>
    <circle cx="684" cy="456" r="12" fill="#475569"/><text x="684" y="460" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">6</text>
    <text x="704" y="460" font-size="14" font-weight="700" fill="#334155">Update loop state</text>
    <text x="676" y="484" font-size="11" fill="#475569">memory.md: last-run timestamp,</text>
    <text x="676" y="500" font-size="11" fill="#475569">active ingestion vectors, confidence,</text>
    <text x="676" y="516" font-size="11" fill="#475569">provenance + backlog priorities</text>
  </g>

  <!-- arrows -->
  <g stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#a2)">
    <path d="M242 143 L282 143"/>
    <path d="M526 143 L566 143"/>
    <path d="M780 143 L804 143"/>
    <!-- derive down to diamond -->
    <path d="M600 182 L520 250" stroke="#7c3aed"/>
    <!-- yes down to step4 -->
    <path d="M405 366 L405 404 L167 404 L167 426"/>
    <!-- step4 -> step5 -> step6 -->
    <path d="M302 476 L342 476"/>
    <path d="M616 476 L656 476"/>
  </g>
  <g stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#a2)">
    <path d="M525 308 L582 308"/>
  </g>
</svg>

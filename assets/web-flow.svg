<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="980" height="470" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="32" y="46" font-size="23" font-weight="700" fill="#0f172a">Web Generator — client-side data flow (GitHub Pages)</text>
  <text x="32" y="70" font-size="14" fill="#64748b">No backend, no database, $0. The static page calls three public CORS-open APIs directly and composes the brief in the browser.</text>

  <defs>
    <marker id="wa" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"/></marker>
    <marker id="wd" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/></marker>
  </defs>

  <!-- Step 1: user selects -->
  <g>
    <rect x="30" y="112" width="200" height="150" rx="11" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/>
    <text x="130" y="138" font-size="14.5" font-weight="700" fill="#312e81" text-anchor="middle">1 · Choose</text>
    <text x="130" y="160" font-size="11.5" fill="#4f46e5" text-anchor="middle">Province → City (CMA)</text>
    <text x="130" y="180" font-size="11.5" fill="#4f46e5" text-anchor="middle">Rent basis (bedroom)</text>
    <text x="130" y="200" font-size="11.5" fill="#4f46e5" text-anchor="middle">Demographic group</text>
    <text x="130" y="220" font-size="11.5" fill="#4f46e5" text-anchor="middle">Brief type (product)</text>
    <text x="130" y="245" font-size="10.5" fill="#6366f1" text-anchor="middle">13 CMAs · 7 × 6 combos</text>
  </g>

  <!-- Step 2: browser fetch -->
  <g>
    <rect x="292" y="112" width="212" height="150" rx="11" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.8"/>
    <text x="398" y="138" font-size="14.5" font-weight="700" fill="#5b21b6" text-anchor="middle">2 · Fetch (parallel)</text>
    <text x="398" y="162" font-size="11" fill="#7c3aed" text-anchor="middle">browser fetch() · precomputed</text>
    <text x="398" y="177" font-size="11" fill="#7c3aed" text-anchor="middle">CMHC coordinates (no metadata)</text>
    <text x="398" y="203" font-size="10.5" fill="#6d28d9" text-anchor="middle">web/js/sources.js</text>
    <text x="398" y="227" font-size="10.5" fill="#6d28d9" text-anchor="middle">→ derive: YoY, annual rent,</text>
    <text x="398" y="242" font-size="10.5" fill="#6d28d9" text-anchor="middle">30%-rule income · confidence</text>
  </g>

  <!-- Step 3: compose + render -->
  <g>
    <rect x="566" y="112" width="200" height="150" rx="11" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.8"/>
    <text x="666" y="138" font-size="14.5" font-weight="700" fill="#134e4a" text-anchor="middle">3 · Compose</text>
    <text x="666" y="162" font-size="11" fill="#0d9488" text-anchor="middle">compose.js → Markdown</text>
    <text x="666" y="180" font-size="11" fill="#0d9488" text-anchor="middle">(mandated section</text>
    <text x="666" y="195" font-size="11" fill="#0d9488" text-anchor="middle">hierarchy + implications)</text>
    <text x="666" y="221" font-size="11" fill="#0d9488" text-anchor="middle">markdown.js → HTML</text>
    <text x="666" y="245" font-size="10.5" fill="#0f766e" text-anchor="middle">render · Download .md · Copy</text>
  </g>

  <!-- Sources -->
  <g>
    <rect x="828" y="104" width="122" height="52" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="1.4"/>
    <text x="889" y="126" font-size="11.5" font-weight="600" fill="#1e3a8a" text-anchor="middle">StatCan WDS</text>
    <text x="889" y="143" font-size="9.5" fill="#2563eb" text-anchor="middle">debt · CPI · rents</text>
  </g>
  <g>
    <rect x="828" y="166" width="122" height="52" rx="9" fill="#ffffff" stroke="#0d9488" stroke-width="1.4"/>
    <text x="889" y="188" font-size="11.5" font-weight="600" fill="#134e4a" text-anchor="middle">CMHC</text>
    <text x="889" y="205" font-size="9.5" fill="#0d9488" text-anchor="middle">via StatCan</text>
  </g>
  <g>
    <rect x="828" y="228" width="122" height="52" rx="9" fill="#ffffff" stroke="#d97706" stroke-width="1.4"/>
    <text x="889" y="250" font-size="11.5" font-weight="600" fill="#92400e" text-anchor="middle">BoC Valet</text>
    <text x="889" y="267" font-size="9.5" fill="#d97706" text-anchor="middle">rates</text>
  </g>

  <!-- arrows between steps -->
  <g stroke="#4f46e5" stroke-width="2.2" fill="none" marker-end="url(#wa)">
    <path d="M230 187 L288 187"/>
    <path d="M504 187 L562 187"/>
  </g>
  <!-- fetch to sources (dashed, client-side, both ways) -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#wd)">
    <path d="M504 150 L824 130"/>
    <path d="M504 187 L824 192"/>
    <path d="M504 224 L824 252"/>
  </g>
  <text x="660" y="120" font-size="10" fill="#94a3b8" text-anchor="middle">CORS: Access-Control-Allow-Origin: *</text>

  <!-- footnote band -->
  <rect x="30" y="300" width="920" height="130" rx="11" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="50" y="328" font-size="13" font-weight="700" fill="#334155">Why fully client-side?</text>
  <text x="50" y="352" font-size="12" fill="#475569">• All three sources send permissive CORS headers, so the browser can call them directly — no proxy, no server.</text>
  <text x="50" y="374" font-size="12" fill="#475569">• CMHC coordinates are precomputed into web/js/catalog.js, so the browser skips the heavy metadata fetch.</text>
  <text x="50" y="396" font-size="12" fill="#475569">• Same compose logic as the Node orchestrator; parity is guarded by unit tests (AC-W1…W6).</text>
  <text x="50" y="418" font-size="12" fill="#475569">• Scheduled email delivery (R9) added a Cloudflare Worker + Neon; a shared-brief gallery (R8) can now reuse them.</text>
</svg>

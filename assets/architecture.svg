<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="980" height="640" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="32" y="46" font-size="23" font-weight="700" fill="#0f172a">Financial-Intelligence-Strategy-Agent — System Architecture</text>
  <text x="32" y="70" font-size="14" fill="#64748b">Two entry points share one core; adapters normalize three public Canadian open-data APIs into cited briefs.</text>

  <!-- lane headers -->
  <text x="118" y="108" font-size="12.5" font-weight="700" fill="#94a3b8" text-anchor="middle">CONSUMERS</text>
  <text x="360" y="108" font-size="12.5" font-weight="700" fill="#94a3b8" text-anchor="middle">AGENT CORE</text>
  <text x="600" y="108" font-size="12.5" font-weight="700" fill="#94a3b8" text-anchor="middle">ADAPTERS (src/mcp/adapters)</text>
  <text x="858" y="108" font-size="12.5" font-weight="700" fill="#94a3b8" text-anchor="middle">PUBLIC DATA SOURCES</text>

  <!-- Consumers -->
  <g>
    <rect x="28" y="130" width="180" height="66" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.6"/>
    <text x="118" y="158" font-size="14" font-weight="600" fill="#312e81" text-anchor="middle">MCP Client</text>
    <text x="118" y="178" font-size="12" fill="#4f46e5" text-anchor="middle">Claude Desktop / Code</text>
  </g>
  <g>
    <rect x="28" y="214" width="180" height="66" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.6"/>
    <text x="118" y="242" font-size="14" font-weight="600" fill="#312e81" text-anchor="middle">Analyst CLI</text>
    <text x="118" y="262" font-size="12" fill="#4f46e5" text-anchor="middle">npm run brief</text>
  </g>

  <!-- Agent core -->
  <g>
    <rect x="270" y="130" width="180" height="86" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.8"/>
    <text x="360" y="156" font-size="14.5" font-weight="700" fill="#5b21b6" text-anchor="middle">MCP Server (stdio)</text>
    <text x="360" y="176" font-size="11.5" fill="#7c3aed" text-anchor="middle">src/mcp/server.js</text>
    <text x="360" y="197" font-size="10.5" fill="#6d28d9" text-anchor="middle">4 tools: statcan · cmhc ·</text>
    <text x="360" y="209" font-size="10.5" fill="#6d28d9" text-anchor="middle">boc · compile_brief</text>
  </g>
  <g>
    <rect x="270" y="232" width="180" height="86" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.8"/>
    <text x="360" y="258" font-size="14.5" font-weight="700" fill="#5b21b6" text-anchor="middle">Orchestrator</text>
    <text x="360" y="278" font-size="11.5" fill="#7c3aed" text-anchor="middle">src/orchestrator.js</text>
    <text x="360" y="299" font-size="10.5" fill="#6d28d9" text-anchor="middle">runs the 6-step SOP +</text>
    <text x="360" y="311" font-size="10.5" fill="#6d28d9" text-anchor="middle">confidence guardrail</text>
  </g>

  <!-- Adapters -->
  <g>
    <rect x="512" y="126" width="176" height="58" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
    <text x="600" y="150" font-size="13" font-weight="600" fill="#1e3a8a" text-anchor="middle">statcan.js</text>
    <text x="600" y="169" font-size="10.5" fill="#2563eb" text-anchor="middle">WDS · concept + coord resolver</text>
  </g>
  <g>
    <rect x="512" y="196" width="176" height="58" rx="9" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.6"/>
    <text x="600" y="220" font-size="13" font-weight="600" fill="#134e4a" text-anchor="middle">cmhc.js</text>
    <text x="600" y="239" font-size="10.5" fill="#0d9488" text-anchor="middle">rents/vacancy via StatCan</text>
  </g>
  <g>
    <rect x="512" y="266" width="176" height="58" rx="9" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
    <text x="600" y="290" font-size="13" font-weight="600" fill="#92400e" text-anchor="middle">bankofcanada.js</text>
    <text x="600" y="309" font-size="10.5" fill="#d97706" text-anchor="middle">Valet · rates &amp; FX</text>
  </g>
  <g>
    <rect x="512" y="336" width="176" height="40" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="600" y="361" font-size="11.5" font-weight="600" fill="#475569" text-anchor="middle">lib/http.js · timeout + retry</text>
  </g>

  <!-- Sources -->
  <g>
    <rect x="770" y="126" width="182" height="58" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="1.4"/>
    <text x="861" y="150" font-size="12.5" font-weight="600" fill="#1e3a8a" text-anchor="middle">Statistics Canada WDS</text>
    <text x="861" y="169" font-size="10" fill="#2563eb" text-anchor="middle">38-10-0238 · 18-10-0004</text>
  </g>
  <g>
    <rect x="770" y="196" width="182" height="58" rx="9" fill="#ffffff" stroke="#0d9488" stroke-width="1.4"/>
    <text x="861" y="220" font-size="12.5" font-weight="600" fill="#134e4a" text-anchor="middle">CMHC (no public API)</text>
    <text x="861" y="239" font-size="10" fill="#0d9488" text-anchor="middle">34-10-0133/0127 via WDS</text>
  </g>
  <g>
    <rect x="770" y="266" width="182" height="58" rx="9" fill="#ffffff" stroke="#d97706" stroke-width="1.4"/>
    <text x="861" y="290" font-size="12.5" font-weight="600" fill="#92400e" text-anchor="middle">Bank of Canada Valet</text>
    <text x="861" y="309" font-size="10" fill="#d97706" text-anchor="middle">V39079 · prime · 5yr mtg</text>
  </g>

  <!-- Outputs band -->
  <text x="32" y="452" font-size="12.5" font-weight="700" fill="#94a3b8">OUTPUTS (write-side)</text>
  <line x1="32" y1="462" x2="948" y2="462" stroke="#e2e8f0" stroke-width="1.5"/>
  <g>
    <rect x="32" y="482" width="280" height="120" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
    <text x="172" y="510" font-size="14" font-weight="700" fill="#334155" text-anchor="middle">data/briefs/</text>
    <text x="172" y="532" font-size="11.5" fill="#475569" text-anchor="middle">executive strategy briefs (.md)</text>
    <text x="172" y="554" font-size="11.5" fill="#475569" text-anchor="middle">master_index.md — matrix by</text>
    <text x="172" y="570" font-size="11.5" fill="#475569" text-anchor="middle">demographic × product category</text>
    <text x="172" y="590" font-size="10.5" fill="#64748b" text-anchor="middle">via compile_strategy_brief</text>
  </g>
  <g>
    <rect x="350" y="482" width="280" height="120" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
    <text x="490" y="510" font-size="14" font-weight="700" fill="#334155" text-anchor="middle">data/raw/</text>
    <text x="490" y="532" font-size="11.5" fill="#475569" text-anchor="middle">per-run JSON snapshots</text>
    <text x="490" y="554" font-size="11.5" fill="#475569" text-anchor="middle">of every live API pull</text>
    <text x="490" y="576" font-size="10.5" fill="#64748b" text-anchor="middle">provenance / reproducibility</text>
  </g>
  <g>
    <rect x="668" y="482" width="280" height="120" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
    <text x="808" y="510" font-size="14" font-weight="700" fill="#334155" text-anchor="middle">memory.md</text>
    <text x="808" y="532" font-size="11.5" fill="#475569" text-anchor="middle">running-state log: timestamps,</text>
    <text x="808" y="554" font-size="11.5" fill="#475569" text-anchor="middle">ingestion vectors, confidence</text>
    <text x="808" y="576" font-size="10.5" fill="#64748b" text-anchor="middle">+ escalation flags</text>
  </g>

  <!-- arrows -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <g stroke="#94a3b8" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M208 163 L266 168"/>
    <path d="M208 247 L266 262"/>
    <!-- core to adapters -->
    <path d="M450 168 L508 155"/>
    <path d="M450 195 L508 220"/>
    <path d="M450 280 L508 295"/>
    <!-- adapters to sources -->
    <path d="M688 155 L766 155"/>
    <path d="M688 225 L766 225"/>
    <path d="M688 295 L766 295"/>
    <!-- core to outputs -->
    <path d="M340 322 L200 478"/>
    <path d="M368 322 L470 478"/>
    <path d="M392 322 L760 478"/>
  </g>
  <!-- data-return arrows (sources back to adapters) -->
  <g stroke="#cbd5e1" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#arr)">
    <path d="M766 172 L690 172"/>
    <path d="M766 242 L690 242"/>
    <path d="M766 312 L690 312"/>
  </g>
  <text x="727" y="128" font-size="9.5" fill="#94a3b8" text-anchor="middle">request →</text>
  <text x="727" y="349" font-size="9.5" fill="#94a3b8" text-anchor="middle">← JSON</text>
</svg>
